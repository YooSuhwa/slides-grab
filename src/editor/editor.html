<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Editor - ppt-agent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    /* === Reset & Base === */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    .editor-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* === Navigation Bar === */
    .nav-bar {
      height: 48px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-bar button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .nav-bar button:hover {
      background: #555;
    }

    .nav-bar button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .nav-bar button:disabled:hover {
      background: #333;
    }

    .slide-counter {
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      min-width: 60px;
      text-align: center;
    }

    .nav-spacer {
      flex: 1;
    }

    .brand {
      color: #555;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* === Main Content === */
    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* === Slide Viewport === */
    .slide-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-width: 0;
      overflow: hidden;
      background: #111;
    }

    .slide-wrapper {
      position: relative;
      /* 720pt × 405pt = 960px × 540px at CSS 96dpi (1pt = 4/3 px) */
      width: 960px;
      height: 540px;
      transform-origin: center center;
    }

    .slide-wrapper iframe {
      width: 960px;
      height: 540px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #fff;
      display: block;
    }

    /* === Feedback Panel === */
    .feedback-panel {
      width: 380px;
      min-width: 320px;
      background: #1a1a1a;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel-section {
      padding: 16px;
    }

    .panel-section + .panel-section {
      border-top: 1px solid #333;
    }

    .panel-label {
      color: #aaa;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .feedback-textarea {
      width: 100%;
      height: 120px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    .feedback-textarea:focus {
      border-color: #666;
    }

    .feedback-textarea::placeholder {
      color: #555;
    }

    .btn {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
      margin-top: 8px;
    }

    .btn:hover {
      background: #555;
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .btn:disabled:hover {
      background: #333;
    }

    .btn-primary {
      background: #2563eb;
    }

    .btn-primary:hover {
      background: #3b82f6;
    }

    .btn-primary:disabled {
      background: #2563eb;
    }

    .btn-primary:disabled:hover {
      background: #2563eb;
    }

    .btn-apply {
      background: #16a34a;
    }

    .btn-apply:hover {
      background: #22c55e;
    }

    .btn-apply:disabled {
      background: #16a34a;
    }

    .btn-apply:disabled:hover {
      background: #16a34a;
    }

    /* === Spinner === */
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .spinner.visible {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === Change Spec Display === */
    .changespec-section {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .changespec-content {
      flex: 1;
      overflow-y: auto;
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.6;
      color: #ddd;
    }

    .changespec-content:empty::before {
      content: 'Change spec will appear here after VLM review.';
      color: #555;
      font-style: italic;
    }

    .changespec-content h3 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin: 12px 0 6px;
    }

    .changespec-content h3:first-child {
      margin-top: 0;
    }

    .changespec-content h4 {
      font-size: 13px;
      font-weight: 600;
      color: #eee;
      margin: 10px 0 4px;
    }

    .changespec-content h4:first-child {
      margin-top: 0;
    }

    .changespec-content ul {
      margin: 4px 0 8px 18px;
      padding: 0;
    }

    .changespec-content li {
      margin: 2px 0;
      color: #ccc;
    }

    .changespec-content code {
      background: #333;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: #f0abfc;
    }

    .changespec-content pre {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 10px 12px;
      margin: 8px 0;
      overflow-x: auto;
    }

    .changespec-content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: 12px;
      color: #ddd;
    }

    .changespec-content strong {
      color: #fff;
      font-weight: 600;
    }

    /* === Status Bar === */
    .status-bar {
      height: 28px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      color: #555;
      flex-shrink: 0;
      gap: 16px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.connected {
      background: #22c55e;
    }

    .status-dot.disconnected {
      background: #ef4444;
    }

    .status-message {
      flex: 1;
      text-align: right;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* === Scrollbar === */
    .changespec-content::-webkit-scrollbar {
      width: 6px;
    }

    .changespec-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .changespec-content::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }

    .changespec-content::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* === Hidden utility === */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <!-- Navigation Bar -->
    <div class="nav-bar">
      <div class="nav-controls">
        <button id="btn-prev" title="Previous slide (Left arrow)">&#9664; Prev</button>
        <span class="slide-counter" id="slide-counter">-- / --</span>
        <button id="btn-next" title="Next slide (Right arrow)">Next &#9654;</button>
      </div>
      <div class="nav-spacer"></div>
      <span class="brand">ppt-agent</span>
    </div>

    <!-- Main Content: Slide + Feedback -->
    <div class="main-content">
      <!-- Slide Viewport -->
      <div class="slide-panel" id="slide-panel">
        <div class="slide-wrapper" id="slide-wrapper">
          <iframe id="slide-iframe" sandbox="allow-same-origin allow-scripts" loading="eager"></iframe>
        </div>
      </div>

      <!-- Feedback Panel -->
      <div class="feedback-panel">
        <!-- Feedback Input -->
        <div class="panel-section">
          <div class="panel-label">Feedback</div>
          <textarea
            class="feedback-textarea"
            id="feedback-textarea"
            placeholder="Describe what changes you want for this slide..."
          ></textarea>
          <button class="btn btn-primary" id="btn-submit" disabled>
            <span class="spinner" id="spinner-submit"></span>
            <span id="btn-submit-text">Submit to VLM</span>
          </button>
        </div>

        <!-- Change Spec -->
        <div class="panel-section changespec-section">
          <div class="panel-label">Change Spec</div>
          <div class="changespec-content" id="changespec-content"></div>
          <button class="btn btn-apply hidden" id="btn-apply">
            <span class="spinner" id="spinner-apply"></span>
            <span id="btn-apply-text">Apply Changes</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span>
        <span class="status-dot" id="status-dot"></span>
        <span id="status-connection">Connecting...</span>
      </span>
      <span class="status-message" id="status-message"></span>
    </div>
  </div>

  <script>
    // =========================================================================
    // State
    // =========================================================================
    let slides = [];
    let currentIndex = 0;
    let currentChangeSpec = null;
    let isSubmitting = false;
    let isApplying = false;

    // =========================================================================
    // DOM References
    // =========================================================================
    const $ = (sel) => document.querySelector(sel);
    const btnPrev       = $('#btn-prev');
    const btnNext       = $('#btn-next');
    const slideCounter  = $('#slide-counter');
    const slideIframe   = $('#slide-iframe');
    const slidePanel    = $('#slide-panel');
    const slideWrapper  = $('#slide-wrapper');
    const textarea      = $('#feedback-textarea');
    const btnSubmit     = $('#btn-submit');
    const btnSubmitText = $('#btn-submit-text');
    const spinnerSubmit = $('#spinner-submit');
    const changespecEl  = $('#changespec-content');
    const btnApply      = $('#btn-apply');
    const btnApplyText  = $('#btn-apply-text');
    const spinnerApply  = $('#spinner-apply');
    const statusDot     = $('#status-dot');
    const statusConn    = $('#status-connection');
    const statusMsg     = $('#status-message');

    // =========================================================================
    // Navigation
    // =========================================================================
    function goToSlide(index) {
      if (index < 0 || index >= slides.length) return;
      currentIndex = index;
      slideIframe.src = `/slides/${slides[currentIndex]}`;
      slideCounter.textContent = `${currentIndex + 1} / ${slides.length}`;
      btnPrev.disabled = currentIndex === 0;
      btnNext.disabled = currentIndex === slides.length - 1;

      // Clear change spec when navigating
      currentChangeSpec = null;
      changespecEl.innerHTML = '';
      btnApply.classList.add('hidden');
    }

    btnPrev.addEventListener('click', () => goToSlide(currentIndex - 1));
    btnNext.addEventListener('click', () => goToSlide(currentIndex + 1));

    // =========================================================================
    // Viewport scaling
    // =========================================================================
    // 720pt × 405pt = 960px × 540px at CSS 96dpi
    const SLIDE_W = 960;
    const SLIDE_H = 540;

    function scaleSlide() {
      const panel = slidePanel;
      const padX = 48; // 24px each side
      const padY = 48;
      const availW = panel.clientWidth - padX;
      const availH = panel.clientHeight - padY;
      if (availW <= 0 || availH <= 0) return;

      const scale = Math.min(availW / SLIDE_W, availH / SLIDE_H) * 0.95;
      slideWrapper.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', scaleSlide);

    // =========================================================================
    // Feedback submit
    // =========================================================================
    textarea.addEventListener('input', updateSubmitState);

    function updateSubmitState() {
      btnSubmit.disabled = textarea.value.trim() === '' || isSubmitting;
    }

    btnSubmit.addEventListener('click', submitFeedback);

    async function submitFeedback() {
      if (isSubmitting || textarea.value.trim() === '') return;
      isSubmitting = true;
      btnSubmit.disabled = true;
      btnSubmitText.textContent = 'Analyzing...';
      spinnerSubmit.classList.add('visible');
      setStatus('Submitting feedback to VLM...');

      try {
        const res = await fetch('/api/vlm-feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slide: slides[currentIndex],
            feedback: textarea.value
          })
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`Server error ${res.status}: ${errText}`);
        }

        const data = await res.json();
        currentChangeSpec = data.changeSpec;
        changespecEl.innerHTML = renderMarkdown(currentChangeSpec);
        btnApply.classList.remove('hidden');
        btnApply.disabled = false;
        setStatus('Change spec received. Review and apply when ready.');
      } catch (err) {
        setStatus(`Error: ${err.message}`);
        console.error('VLM feedback error:', err);
      } finally {
        isSubmitting = false;
        btnSubmitText.textContent = 'Submit to VLM';
        spinnerSubmit.classList.remove('visible');
        updateSubmitState();
      }
    }

    // =========================================================================
    // Apply changes
    // =========================================================================
    btnApply.addEventListener('click', applyChanges);

    async function applyChanges() {
      if (isApplying || !currentChangeSpec) return;
      isApplying = true;
      btnApply.disabled = true;
      btnApplyText.textContent = 'Applying...';
      spinnerApply.classList.add('visible');
      setStatus('Applying changes via agent...');

      try {
        const res = await fetch('/api/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slide: slides[currentIndex],
            changeSpec: currentChangeSpec
          })
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`Server error ${res.status}: ${errText}`);
        }

        const data = await res.json();
        if (data.success) {
          setStatus(data.message || 'Changes applied successfully.');
        } else {
          setStatus(`Apply failed: ${data.message || 'Unknown error'}`);
        }
      } catch (err) {
        setStatus(`Error: ${err.message}`);
        console.error('Apply error:', err);
      } finally {
        isApplying = false;
        btnApplyText.textContent = 'Apply Changes';
        spinnerApply.classList.remove('visible');
        btnApply.disabled = false;
      }
    }

    // =========================================================================
    // SSE auto-refresh
    // =========================================================================
    function connectSSE() {
      const evtSource = new EventSource('/api/events');

      evtSource.onopen = () => {
        statusDot.classList.add('connected');
        statusDot.classList.remove('disconnected');
        statusConn.textContent = 'Connected';
      };

      evtSource.addEventListener('fileChanged', (e) => {
        try {
          const { file } = JSON.parse(e.data);
          if (file === slides[currentIndex]) {
            slideIframe.src = slideIframe.src; // force reload
            setStatus(`Slide ${file} updated, iframe reloaded.`);
          }
        } catch (err) {
          console.error('SSE parse error:', err);
        }
      });

      evtSource.onerror = () => {
        statusDot.classList.remove('connected');
        statusDot.classList.add('disconnected');
        statusConn.textContent = 'Disconnected';
        // EventSource will auto-reconnect
      };
    }

    // =========================================================================
    // Keyboard shortcuts
    // =========================================================================
    document.addEventListener('keydown', (e) => {
      const inTextarea = document.activeElement === textarea;

      // Ctrl+Enter (or Cmd+Enter) to submit feedback
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        submitFeedback();
        return;
      }

      // Arrow navigation only when textarea is not focused
      if (inTextarea) return;

      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        goToSlide(currentIndex - 1);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        goToSlide(currentIndex + 1);
      }
    });

    // =========================================================================
    // Status bar
    // =========================================================================
    function setStatus(msg) {
      statusMsg.textContent = msg;
    }

    // =========================================================================
    // Lightweight Markdown Renderer
    // =========================================================================
    function renderMarkdown(md) {
      if (!md) return '';

      const lines = md.split('\n');
      let html = '';
      let inCodeBlock = false;
      let codeBlockContent = '';
      let inList = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Code block toggle
        if (line.trimStart().startsWith('```')) {
          if (inCodeBlock) {
            // Close code block
            html += `<pre><code>${escapeHtml(codeBlockContent.trimEnd())}</code></pre>`;
            codeBlockContent = '';
            inCodeBlock = false;
          } else {
            // Close any open list first
            if (inList) {
              html += '</ul>';
              inList = false;
            }
            inCodeBlock = true;
          }
          continue;
        }

        if (inCodeBlock) {
          codeBlockContent += line + '\n';
          continue;
        }

        // Headings
        if (line.startsWith('## ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h4>${inlineFormat(line.slice(3))}</h4>`;
          continue;
        }
        if (line.startsWith('# ')) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h3>${inlineFormat(line.slice(2))}</h3>`;
          continue;
        }

        // List items
        if (/^[-*]\s/.test(line.trimStart())) {
          if (!inList) {
            html += '<ul>';
            inList = true;
          }
          html += `<li>${inlineFormat(line.trimStart().slice(2))}</li>`;
          continue;
        }

        // Close list if we hit a non-list line
        if (inList) {
          html += '</ul>';
          inList = false;
        }

        // Empty line
        if (line.trim() === '') {
          html += '<br>';
          continue;
        }

        // Regular paragraph text
        html += `${inlineFormat(line)}<br>`;
      }

      // Close any remaining open blocks
      if (inCodeBlock) {
        html += `<pre><code>${escapeHtml(codeBlockContent.trimEnd())}</code></pre>`;
      }
      if (inList) {
        html += '</ul>';
      }

      return html;
    }

    function inlineFormat(text) {
      // Escape HTML first
      text = escapeHtml(text);
      // Inline code: `code`
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Bold: **text**
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return text;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // =========================================================================
    // Initialization
    // =========================================================================
    async function init() {
      setStatus('Loading slide list...');

      try {
        const res = await fetch('/api/slides');
        if (!res.ok) throw new Error(`Failed to fetch slide list: ${res.status}`);
        slides = await res.json();

        if (slides.length === 0) {
          setStatus('No slides found.');
          slideCounter.textContent = '0 / 0';
          return;
        }

        goToSlide(0);
        scaleSlide();
        setStatus('Ready.');
      } catch (err) {
        setStatus(`Error loading slides: ${err.message}`);
        console.error('Init error:', err);
      }

      connectSSE();
    }

    init();
  </script>
</body>
</html>
